<div class="field">
  <label> <mat-icon>location_on</mat-icon> Estado *</label>

  <select [formControl]="control" [ngClass]="{ placeholder: !control.value }">
    <option value="">{{ placeholder }}</option>

    <option *ngFor="let estado of states" [value]="estado.uf">
      {{ estado.nome }}
    </option>
  </select>

  <div class="error" *ngIf="control.touched && control.hasError('required')">
    Campo obrigatório
  </div>
</div>
